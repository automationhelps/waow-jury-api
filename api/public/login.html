<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Studio Stories Publisher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100dvh;font-family:'Manrope',Arial,sans-serif;background:linear-gradient(180deg,#f7f3ed,#fbf8f3);color:#2f261f;font-size:18px;line-height:1.6}
    body{display:grid;place-items:center;padding:2rem}
    .card{background:#fbf8f3;border:1px solid rgba(43,34,26,.14);border-radius:20px;box-shadow:0 18px 50px rgba(34,25,18,.12);padding:2.25rem;max-width:420px;width:100%}
    .mark{width:56px;height:56px;border-radius:14px;background:#d5e5e1;color:#1f6d68;display:grid;place-items:center;margin:0 auto 1.25rem}
    h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:2rem;line-height:1.1;text-align:center;margin-bottom:.35rem}
    p.sub{text-align:center;color:#5b524a;margin-bottom:1.5rem;font-size:1rem}
    label{display:block;font-size:.9rem;font-weight:600;margin-bottom:.5rem;color:#2f261f}
    input{width:100%;padding:.95rem 1rem;font-size:1rem;border:1px solid rgba(43,34,26,.14);border-radius:12px;outline:none;background:#fff}
    input:focus{border-color:#1f6d68;box-shadow:0 0 0 3px rgba(31,109,104,.15)}
    button{width:100%;margin-top:1rem;padding:1rem;font-size:1.05rem;font-weight:600;background:#1f6d68;color:#fff;border:0;border-radius:999px;cursor:pointer;min-height:52px}
    button:hover{background:#15534f}
    button[disabled]{opacity:.6;cursor:wait}
    .err{color:#b03a2e;font-size:.95rem;min-height:1.4em;margin-top:.6rem;text-align:center}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Studio Stories Publisher</h1>
    <p class="sub">Please sign in to continue.</p>
    <form id="f" autocomplete="on">
      <label for="pw">Password</label>
      <input id="pw" type="password" autocomplete="current-password" required />
      <div class="err" id="err" aria-live="polite"></div>
      <button id="btn" type="submit">Sign in</button>
    </form>
  </main>
  <script>
    const f = document.getElementById("f");
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");
    const btn = document.getElementById("btn");
    pw.focus();
    f.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "Signing in…";
      try {
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw.value })
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || "Sign-in failed");
        window.location.href = "/publisher";
      } catch (e2) {
        err.textContent = e2.message;
        btn.disabled = false;
        btn.textContent = "Sign in";
        pw.select();
      }
    });
  </script>
</body>
</html>
